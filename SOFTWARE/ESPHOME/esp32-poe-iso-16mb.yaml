esphome:
  name: esp32-poe-iso-16mb
  comment: Olimex ESP32-POE-ISO WROOM N16 variant with UEXT support

esp32:
  board: esp32dev
  flash_size: 16MB
  framework:
    type: arduino

logger:

# ================= NETWORKING =================

# ---- WiFi (Primary) ----
# Add these entries to secrets.yaml:
# wifi_ssid: "your_wifi_name"
# wifi_password: "your_wifi_password"
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "ESP32-POE-ISO-16MB Fallback"
    password: "fallback123"

captive_portal:

# ---- Ethernet (Alternative to WiFi) ----
# ESPHome cannot use WiFi and Ethernet at the same time.
# To use Ethernet:
#   1. Comment the whole wifi: section above
#   2. Comment captive_portal:
#   3. Uncomment the ethernet: section below
#
#ethernet:
#  type: LAN8720
#  mdc_pin: GPIO23
#  mdio_pin: GPIO18
#  clk:
#    pin: GPIO17
#    mode: CLK_OUT
#  phy_addr: 0
#  power_pin:
#    number: GPIO12
#    ignore_strapping_warning: true

# ================= ONBOARD IO =================

# ---- User Button (BUT1) ----
binary_sensor:
  - platform: gpio
    name: "BUT1 Button"
    pin:
      number: GPIO34
      mode:
        input: true
      inverted: true

# ---- External Power Sense ----
sensor:
  - platform: adc
    pin: GPIO39
    name: "External Power Sense"
    attenuation: 12db
    update_interval: 10s

# ---- Optional Battery Sense ----
# Requires closing the battery sense solder jumper on boards that support it.
#
#  - platform: adc
#    pin: GPIO35
#    name: "Battery Sense"
#    attenuation: 12db
#    update_interval: 10s

# ================= UEXT CONNECTOR =================

# ---- UART on UEXT ----
uart:
  - id: uext_uart
    tx_pin: GPIO4
    rx_pin: GPIO36
    baud_rate: 115200

# ---- I2C Bus on UEXT ----
i2c:
  - id: uext_i2c
    scl: GPIO16
    sda: GPIO13
    scan: true

# ---- SPI Bus on UEXT ----
# UEXT pin 8 MOSI is GPIO2, pin 7 MISO is GPIO15.
# These pins are shared with the microSD interface.
spi:
  - id: uext_spi
    clk_pin: GPIO14
    mosi_pin: GPIO2
    miso_pin: GPIO15

# UEXT SPI chip-select is GPIO5. Add it in the specific SPI device:
#
# cs_pin: GPIO5

# ================= OPTIONAL SD CARD (DISABLED) =================
# To use an SD card, remove the UEXT SPI section above first. SD-card SPI
# uses the same physical pins, but CMD/DATA0 map as MOSI/MISO below.
#
# spi:
#   id: sd_spi
#   clk_pin: GPIO14
#   mosi_pin: GPIO15
#   miso_pin: GPIO2

# ================= CORE SERVICES =================

ota:
  - platform: esphome

api:
